services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: videoad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: videoad
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videoad"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://videoad:${POSTGRES_PASSWORD}@db:5432/videoad

  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    environment:
      INNGEST_DEV: 1
    command: ["inngest", "dev", "-u", "http://app:3000/api/inngest"]
    depends_on:
      - app

volumes:
  pgdata:
